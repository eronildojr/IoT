# EU868 region configuration
[[regions]]
  id = "eu868"
  description = "EU868"
  common_name = "EU868"
  user_info = ""

  [regions.gateway]
    force_gws_private = false

    [regions.gateway.backend]
      enabled = "mqtt"

      [regions.gateway.backend.mqtt]
        topic_prefix = "eu868"
        share_name = "chirpstack"
        server = "tcp://iot_mosquitto:1883"
        username = "chirpstack"
        password = "chirpstack2024"
        qos = 0
        clean_session = false
        client_id = ""
        ca_cert = ""
        tls_cert = ""
        tls_key = ""

  [regions.network]
    installation_margin = 10
    rx_window = 0
    rx1_delay = 1
    rx1_dr_offset = 0
    rx2_dr = 0
    rx2_frequency = 869525000
    rx2_prefer_on_rx1_dr_lt = 0
    rx2_prefer_on_link_budget = false
    downlink_tx_power = -1
    adr_disabled = false
    min_dr = 0
    max_dr = 5
    uplink_dwell_time_400ms = false
    downlink_dwell_time_400ms = false
    uplink_max_eirp = 0
    rejoin_request_enabled = false
    rejoin_request_max_count_n = 0
    rejoin_request_max_time_n = 0
    class_b_ping_slot_dr = 0
    class_b_ping_slot_frequency = 0

    [[regions.network.extra_channels]]
      frequency = 867100000
      min_dr = 0
      max_dr = 5

    [[regions.network.extra_channels]]
      frequency = 867300000
      min_dr = 0
      max_dr = 5

    [[regions.network.extra_channels]]
      frequency = 867500000
      min_dr = 0
      max_dr = 5

    [[regions.network.extra_channels]]
      frequency = 867700000
      min_dr = 0
      max_dr = 5

    [[regions.network.extra_channels]]
      frequency = 867900000
      min_dr = 0
      max_dr = 5
