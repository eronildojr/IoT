version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iotplatform
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_secure_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotuser -d iotplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Node.js ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://iotuser:${POSTGRES_PASSWORD:-iot_secure_pass_2024}@postgres:5432/iotplatform
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production_2024}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@iotplatform.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-Admin@2024!}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME:-Super Admin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot_network
    volumes:
      - ./backend/uploads:/app/uploads

  # ─── Frontend React ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    networks:
      - iot_network

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: iot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - iot_network

  # ─── Certbot SSL ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: iot_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ─── Traccar GPS (opcional) ───────────────────────────────────
  traccar:
    image: traccar/traccar:latest
    container_name: iot_traccar
    restart: unless-stopped
    ports:
      - "8082:8082"    # Web UI
      - "5055:5055"    # OsmAnd
      - "5001:5001"    # Teltonika
      - "5013:5013"    # GPS103
      - "5027:5027"    # H02
    volumes:
      - traccar_data:/opt/traccar/data
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
    networks:
      - iot_network
    profiles:
      - traccar

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
  traccar_data:

networks:
  iot_network:
    driver: bridge
