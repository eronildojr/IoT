version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iotplatform
      POSTGRES_USER: iotuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot_secure_pass_2024}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iot_network
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotuser -d iotplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Node.js ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://iotuser:${POSTGRES_PASSWORD:-iot_secure_pass_2024}@postgres:5432/iotplatform
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production_2024}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@iotplatform.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-Admin@2024!}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME:-Super Admin}
      JIMI_APP_KEY: ${JIMI_APP_KEY:-}
      JIMI_APP_SECRET: ${JIMI_APP_SECRET:-}
      JIMI_BASE_URL: ${JIMI_BASE_URL:-https://eu-open.tracksolidpro.com/route/rest}
      JIMI_ACCESS_TOKEN: ${JIMI_ACCESS_TOKEN:-}
      CHIRPSTACK_MQTT_HOST: mosquitto
      CHIRPSTACK_MQTT_PORT: 1883
      CHIRPSTACK_DEFAULT_TENANT_ID: e2ce35be-666e-4e93-acef-ab07aa258941
      WF_BOT_ENABLED: ${WF_BOT_ENABLED:-false}
      WF_BOT_LOGIN: ${WF_BOT_LOGIN:-BOT_DISPATCH}
      WF_BOT_PASSWORD: ${WF_BOT_PASSWORD:-}
      WF_BOT_DEVICE_ID_FILE: ${WF_BOT_DEVICE_ID_FILE:-/var/groupates/wf_bot_device_id.txt}
      WF_RELAY_WS_URL: ws://groupates_walkiefleet:8070/ws
      WHATSMIAU_API_KEY: ${WHATSMIAU_API_KEY:-}
      WHATSMIAU_INSTANCE: ${WHATSMIAU_INSTANCE:-groupates_ocorrencias}
      WA_WEBHOOK_SECRET: ${WA_WEBHOOK_SECRET:-}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://groupates_ai:8090}
      WA_BOT_ENABLED: ${WA_BOT_ENABLED:-false}
    env_file:
      - /etc/groupates/shinobi.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot_network
      - groupatesiot-network
    volumes:
      - ./backend/uploads:/app/uploads
      - /etc/groupates:/etc/groupates
      - /etc/wireguard:/etc/wireguard
      - /run/wireguard:/run/wireguard
      - /var/groupates/event-snapshots:/app/data/event-snapshots
      - /var/groupates/ptt-recordings:/var/groupates/ptt-recordings
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Frontend React ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    restart: unless-stopped
    networks:
      - iot_network
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: iot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - iot_network
      - groupatesiot-network

  # ─── Certbot SSL ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: iot_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ─── Traccar GPS (opcional) ───────────────────────────────────
  traccar:
    image: traccar/traccar:latest
    container_name: iot_traccar
    restart: unless-stopped
    ports:
      - "8082:8082"    # Web UI
      - "5055:5055"    # OsmAnd
      - "5001:5001"    # Teltonika
      - "5013:5013"    # GPS103
      - "5027:5027"    # H02
    volumes:
      - traccar_data:/opt/traccar/data
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
    networks:
      - iot_network
    profiles:
      - traccar

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
  traccar_data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16
  iot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
  groupatesiot-network:
    external: true
